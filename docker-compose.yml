# GIAFABS Backend — API + its database.
# Run standalone: `docker compose up` from this directory.
# Note: Redis was removed — nothing in server.js requires it (no `redis`
# dependency, no import). Add it back here if a caching layer is introduced.

services:
  postgres:
    image: postgres:16-alpine
    container_name: giafabs-postgres-new
    ports:
      - "${PGPORT:-8090}:5432"
    environment:
      POSTGRES_DB: ${PGDATABASE:-giafabs_db}
      POSTGRES_USER: ${PGUSER:-postgres}
      POSTGRES_PASSWORD: ${PGPASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - giafabs-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: giafabs-backend
    ports:
      - "${API_PORT:-3001}:3001"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      # Backend talks to postgres over the internal docker network, so this
      # is always the container's own port (5432), independent of whatever
      # host port is published above.
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: ${PGUSER:-postgres}
      PGPASSWORD: ${PGPASSWORD:-postgres}
      PGDATABASE: ${PGDATABASE:-giafabs_db}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-change-in-production}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/products', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - giafabs-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  giafabs-network:
    driver: bridge
